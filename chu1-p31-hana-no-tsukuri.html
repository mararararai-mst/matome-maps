<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花のつくり｜まとめマップ</title>
<style>
@page { size: A4 landscape; margin: 12mm; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "UD デジタル 教科書体 NP-B", "Hiragino Maru Gothic ProN", "Meiryo", sans-serif;
  background: white;
  color: #222;
  padding: 16px;
}
.wrap { max-width: 1000px; margin: 0 auto; }
h1 {
  font-size: 18px;
  text-align: center;
  color: #222;
  padding-bottom: 6px;
  border-bottom: 2px solid #222;
  margin-bottom: 16px;
  letter-spacing: 0.08em;
}
.meta {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-bottom: 14px;
}
svg { display: block; margin: 0 auto; width: 100%; height: auto; max-width: 1000px; }

.node {
  fill: white;
  stroke: #222;
  stroke-width: 1.6;
}
.node-main {
  fill: #fff9ec;
  stroke: #222;
  stroke-width: 2.5;
}
.node-leaf {
  fill: #fff4c2;
  stroke: #222;
  stroke-width: 2;
}
.label {
  font-family: inherit;
  font-size: 15px;
  fill: #222;
  text-anchor: middle;
  dominant-baseline: central;
}
.label-main { font-size: 18px; font-weight: bold; }
.label-leaf { font-weight: bold; }
.link {
  stroke: #222;
  stroke-width: 1.4;
  fill: none;
}
.linkword {
  font-size: 11px;
  fill: #666;
  text-anchor: middle;
  dominant-baseline: central;
  font-style: italic;
}

.summary {
  margin-top: 22px;
  padding: 14px 18px;
  border: 1.5px solid #222;
  font-size: 14px;
  line-height: 2;
}
.summary strong {
  display: block;
  margin-bottom: 6px;
  font-size: 15px;
}
.summary .blank {
  display: inline-block;
  border-bottom: 1.5px solid #222;
  min-width: 70px;
  text-align: center;
  padding: 0 6px;
  color: #666;
  font-size: 13px;
}
.print-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #D63384;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 12px;
}
@media print {
  .print-btn { display: none; }
  body { padding: 0; }
}
</style>
</head>
<body>
<div class="wrap">

<h1>花のつくり｜まとめマップ <button class="print-btn" onclick="window.print()">🖨 印刷</button></h1>
<div class="meta">中1理科 単元1-2「植物の分類」P.31</div>

<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg">

  <!-- ── 花のつくり（中心） ── -->
  <rect class="node-main" x="410" y="14" width="180" height="48" rx="8"/>
  <text class="label label-main" x="500" y="38">花のつくり</text>

  <!-- 中心 → 4要素（外側から順に） -->
  <line class="link" x1="500" y1="62" x2="500" y2="92"/>
  <text class="linkword" x="586" y="78">外側から順に</text>

  <line class="link" x1="100" y1="92" x2="900" y2="92"/>
  <line class="link" x1="100" y1="92" x2="100" y2="120"/>
  <line class="link" x1="370" y1="92" x2="370" y2="120"/>
  <line class="link" x1="630" y1="92" x2="630" y2="120"/>
  <line class="link" x1="900" y1="92" x2="900" y2="120"/>

  <!-- 順序の番号 -->
  <text class="linkword" x="100" y="108" style="font-size:13px;fill:#c0392b;font-weight:bold;">①</text>
  <text class="linkword" x="370" y="108" style="font-size:13px;fill:#c0392b;font-weight:bold;">②</text>
  <text class="linkword" x="630" y="108" style="font-size:13px;fill:#c0392b;font-weight:bold;">③</text>
  <text class="linkword" x="900" y="108" style="font-size:13px;fill:#c0392b;font-weight:bold;">④</text>

  <!-- 4要素 -->
  <rect class="node" x="40" y="120" width="120" height="44" rx="8"/>
  <text class="label" x="100" y="142">がく</text>

  <rect class="node" x="310" y="120" width="120" height="44" rx="8"/>
  <text class="label" x="370" y="142">花弁</text>

  <rect class="node" x="570" y="120" width="120" height="44" rx="8"/>
  <text class="label" x="630" y="142">おしべ</text>

  <rect class="node" x="840" y="120" width="120" height="44" rx="8"/>
  <text class="label" x="900" y="142">めしべ</text>

  <!-- ── 花弁の枝 ── -->
  <line class="link" x1="370" y1="164" x2="370" y2="200"/>
  <text class="linkword" x="442" y="184">花弁の形は？</text>

  <line class="link" x1="260" y1="200" x2="480" y2="200"/>
  <line class="link" x1="260" y1="200" x2="260" y2="250"/>
  <line class="link" x1="480" y1="200" x2="480" y2="250"/>

  <text class="linkword" x="260" y="222" style="font-size:11px;">1枚ずつ分かれ</text>
  <text class="linkword" x="480" y="222" style="font-size:11px;">1枚につながる</text>

  <rect class="node-leaf" x="200" y="250" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="260" y="272">離弁花</text>

  <rect class="node-leaf" x="420" y="250" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="480" y="272">合弁花</text>

  <!-- ── おしべの枝 ── -->
  <line class="link" x1="630" y1="164" x2="630" y2="200"/>
  <text class="linkword" x="676" y="184">先端</text>

  <rect class="node" x="570" y="200" width="120" height="44" rx="8"/>
  <text class="label" x="630" y="222">やく</text>

  <line class="link" x1="630" y1="244" x2="630" y2="280"/>
  <text class="linkword" x="676" y="262">の中</text>

  <rect class="node-leaf" x="570" y="280" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="630" y="302">花粉</text>

  <!-- ── めしべの枝 ── -->
  <!-- めしべ は2方向（子房系・柱頭系） -->
  <line class="link" x1="900" y1="164" x2="900" y2="200"/>
  <line class="link" x1="740" y1="200" x2="940" y2="200"/>
  <line class="link" x1="740" y1="200" x2="740" y2="250"/>
  <line class="link" x1="940" y1="200" x2="940" y2="250"/>

  <text class="linkword" x="740" y="222" style="font-size:11px;">ふくらんだ部分</text>
  <text class="linkword" x="940" y="222" style="font-size:11px;">先端</text>

  <rect class="node" x="680" y="250" width="120" height="44" rx="8"/>
  <text class="label" x="740" y="272">子房</text>

  <rect class="node-leaf" x="880" y="250" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="940" y="272">柱頭</text>

  <!-- 子房 → 胚珠 -->
  <line class="link" x1="740" y1="294" x2="740" y2="335"/>
  <text class="linkword" x="780" y="314">の中</text>

  <rect class="node-leaf" x="680" y="335" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="740" y="357">胚珠</text>

</svg>

<div class="summary">
  <strong>📝 まとめ文（マップを矢印の順になぞって書こう）</strong>
  花は外側から順に、 <span class="blank">がく</span> 、 <span class="blank">花弁</span> 、 <span class="blank">おしべ</span> 、 <span class="blank">めしべ</span> がついている。<br>
  花弁が1枚ずつ分かれている花を <span class="blank">離弁花</span> 、1枚につながっている花を <span class="blank">合弁花</span> という。<br>
  おしべの先端を <span class="blank">やく</span> といい、その中に <span class="blank">花粉</span> が入っている。<br>
  めしべのふくらんだ部分を <span class="blank">子房</span> 、その中の小さなつぶを <span class="blank">胚珠</span> という。めしべの先端を <span class="blank">柱頭</span> という。
</div>

</div>
</body>
</html>
