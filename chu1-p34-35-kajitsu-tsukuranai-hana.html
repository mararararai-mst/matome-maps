<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>果実をつくらない花｜まとめマップ</title>
<style>
@page { size: A4 landscape; margin: 10mm; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "UD デジタル 教科書体 NP-B", "Hiragino Maru Gothic ProN", "Meiryo", sans-serif;
  background: white;
  color: #222;
  padding: 12px 16px;
}
.wrap { max-width: 1280px; margin: 0 auto; }
h1 {
  font-size: 18px;
  text-align: center;
  color: #222;
  padding-bottom: 6px;
  border-bottom: 2px solid #222;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}
.meta { text-align: center; font-size: 12px; color: #888; margin-bottom: 12px; }

svg { display: block; margin: 0 auto; width: 100%; height: auto; max-width: 1280px; }

.node {
  fill: white;
  stroke: #222;
  stroke-width: 1.6;
}
.node-main {
  fill: #fff9ec;
  stroke: #222;
  stroke-width: 2.5;
}
.node-leaf {
  fill: #fff4c2;
  stroke: #222;
  stroke-width: 2;
}
.node-cross {
  fill: #ffe3ec;
  stroke: #D63384;
  stroke-width: 2;
}
.node-info {
  fill: #f7f7f0;
  stroke: #888;
  stroke-width: 1.2;
}
.label {
  font-family: inherit;
  font-size: 14px;
  fill: #222;
  text-anchor: middle;
  dominant-baseline: central;
}
.label-main { font-size: 16px; font-weight: bold; }
.label-leaf { font-weight: bold; }
.label-cross { fill: #D63384; font-weight: bold; }
.label-info { font-size: 12px; fill: #555; }
.link {
  stroke: #222;
  stroke-width: 1.4;
  fill: none;
}
.linkword {
  font-size: 11px;
  fill: #666;
  text-anchor: middle;
  dominant-baseline: central;
  font-style: italic;
}
.section-title {
  font-family: inherit;
  font-size: 16px;
  font-weight: bold;
  fill: #2E7D32;
  text-anchor: middle;
}
.divider {
  stroke: #ccc;
  stroke-width: 1;
  stroke-dasharray: 6 4;
}

.summary {
  margin-top: 16px;
  padding: 12px 16px;
  border: 1.5px solid #222;
  font-size: 13px;
  line-height: 1.9;
}
.summary strong { display: block; margin-bottom: 4px; font-size: 14px; }
.summary .blank {
  display: inline-block;
  border-bottom: 1.5px solid #222;
  min-width: 70px;
  text-align: center;
  padding: 0 6px;
  color: #666;
  font-size: 12px;
}
.print-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #D63384;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 12px;
}
@media print {
  .print-btn { display: none; }
  body { padding: 0; }
}
</style>
</head>
<body>
<div class="wrap">

<h1>果実をつくらない花｜まとめマップ <button class="print-btn" onclick="window.print()">🖨 印刷</button></h1>
<div class="meta">中1理科 単元1-2「植物の分類」P.34-35</div>

<svg viewBox="0 0 1280 600" xmlns="http://www.w3.org/2000/svg">

  <!-- セクションタイトル -->
  <text class="section-title" x="300" y="20">◆ マツの花のつくり ◆</text>
  <text class="section-title" x="940" y="20">◆ 種子をつくる植物の分類 ◆</text>

  <!-- 中央区切り線 -->
  <line class="divider" x1="620" y1="30" x2="620" y2="580"/>

  <!-- ============ 左：マツの花のつくり ============ -->

  <!-- マツ（中心） -->
  <rect class="node-main" x="240" y="40" width="120" height="44" rx="8"/>
  <text class="label label-main" x="300" y="62">マツ</text>

  <!-- マツ → 雌花 / 雄花 -->
  <line class="link" x1="300" y1="84" x2="300" y2="115"/>
  <line class="link" x1="180" y1="115" x2="420" y2="115"/>
  <line class="link" x1="180" y1="115" x2="180" y2="140"/>
  <line class="link" x1="420" y1="115" x2="420" y2="140"/>

  <rect class="node" x="120" y="140" width="120" height="40" rx="8"/>
  <text class="label" x="180" y="160">雌花</text>

  <rect class="node" x="360" y="140" width="120" height="40" rx="8"/>
  <text class="label" x="420" y="160">雄花</text>

  <!-- 共通：花弁・がくは「ない」 -->
  <rect class="node-cross" x="240" y="195" width="120" height="34" rx="8"/>
  <text class="label label-cross" x="300" y="212" style="font-size:13px;">花弁・がく ✕</text>
  <line class="link" x1="180" y1="180" x2="180" y2="195"/>
  <line class="link" x1="420" y1="180" x2="420" y2="195"/>
  <line class="link" x1="180" y1="195" x2="420" y2="195"/>

  <!-- 雌花 → りん片 -->
  <line class="link" x1="180" y1="229" x2="180" y2="260"/>
  <text class="linkword" x="218" y="244">うろこ状</text>
  <rect class="node" x="120" y="260" width="120" height="40" rx="8"/>
  <text class="label" x="180" y="280">りん片</text>

  <!-- 雄花 → りん片 -->
  <line class="link" x1="420" y1="229" x2="420" y2="260"/>
  <text class="linkword" x="458" y="244">うろこ状</text>
  <rect class="node" x="360" y="260" width="120" height="40" rx="8"/>
  <text class="label" x="420" y="280">りん片</text>

  <!-- 雌花のりん片 → 子房なし / 胚珠むき出し -->
  <line class="link" x1="180" y1="300" x2="180" y2="335"/>
  <text class="linkword" x="225" y="318" style="font-size:10px;">つけ根に</text>
  <rect class="node-cross" x="120" y="335" width="120" height="34" rx="8"/>
  <text class="label label-cross" x="180" y="352" style="font-size:13px;">子房 ✕</text>

  <line class="link" x1="180" y1="369" x2="180" y2="400"/>
  <text class="linkword" x="218" y="384" style="font-size:10px;">代わりに</text>
  <rect class="node-leaf" x="115" y="400" width="130" height="50" rx="8"/>
  <text class="label label-leaf" x="180" y="416" style="font-size:13px;">胚珠</text>
  <text class="label" x="180" y="436" style="font-size:11px;">（むき出し2つ）</text>

  <!-- 雄花のりん片 → 花粉のう → 花粉 -->
  <line class="link" x1="420" y1="300" x2="420" y2="335"/>
  <text class="linkword" x="465" y="318" style="font-size:10px;">の中に</text>
  <rect class="node" x="360" y="335" width="120" height="40" rx="8"/>
  <text class="label" x="420" y="355">花粉のう</text>

  <line class="link" x1="420" y1="375" x2="420" y2="410"/>
  <text class="linkword" x="455" y="392" style="font-size:10px;">の中に</text>
  <rect class="node-leaf" x="360" y="410" width="120" height="40" rx="8"/>
  <text class="label label-leaf" x="420" y="430">花粉</text>

  <!-- 受粉 → 種子 -->
  <line class="link" x1="180" y1="450" x2="180" y2="500"/>
  <line class="link" x1="420" y1="450" x2="420" y2="500"/>
  <line class="link" x1="180" y1="500" x2="420" y2="500"/>
  <line class="link" x1="300" y1="500" x2="300" y2="525"/>
  <text class="linkword" x="345" y="513" style="font-size:11px;">花粉が胚珠に直接ついて受粉</text>

  <rect class="node-leaf" x="240" y="525" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="300" y="547">種子</text>

  <!-- ============ 右：種子をつくる植物の分類 ============ -->

  <!-- 種子植物（中心） -->
  <rect class="node-main" x="860" y="40" width="160" height="50" rx="8"/>
  <text class="label label-main" x="940" y="56" style="font-size:14px;">種子をつくる植物</text>
  <text class="label label-main" x="940" y="76" style="font-size:13px;">＝ 種子植物</text>

  <!-- 種子植物 → 被子 / 裸子 -->
  <line class="link" x1="940" y1="90" x2="940" y2="120"/>
  <line class="link" x1="800" y1="120" x2="1080" y2="120"/>
  <line class="link" x1="800" y1="120" x2="800" y2="150"/>
  <line class="link" x1="1080" y1="120" x2="1080" y2="150"/>

  <rect class="node-main" x="730" y="150" width="140" height="44" rx="8"/>
  <text class="label label-main" x="800" y="172">被子植物</text>

  <rect class="node-main" x="1010" y="150" width="140" height="44" rx="8"/>
  <text class="label label-main" x="1080" y="172">裸子植物</text>

  <!-- 被子：子房あり -->
  <line class="link" x1="800" y1="194" x2="800" y2="220"/>
  <rect class="node-cross" x="740" y="220" width="120" height="34" rx="8" style="fill:#d8f3dc;stroke:#2E7D32;"/>
  <text class="label label-cross" x="800" y="237" style="fill:#2E7D32;font-size:13px;">子房 ◯</text>

  <line class="link" x1="800" y1="254" x2="800" y2="280"/>
  <text class="linkword" x="850" y="267" style="font-size:10px;">の中に</text>
  <rect class="node-leaf" x="740" y="280" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="800" y="302" style="font-size:13px;">胚珠</text>

  <!-- 裸子：子房なし -->
  <line class="link" x1="1080" y1="194" x2="1080" y2="220"/>
  <rect class="node-cross" x="1020" y="220" width="120" height="34" rx="8"/>
  <text class="label label-cross" x="1080" y="237" style="font-size:13px;">子房 ✕</text>

  <line class="link" x1="1080" y1="254" x2="1080" y2="280"/>
  <text class="linkword" x="1135" y="267" style="font-size:10px;">むき出し</text>
  <rect class="node-leaf" x="1020" y="280" width="120" height="44" rx="8"/>
  <text class="label label-leaf" x="1080" y="302" style="font-size:13px;">胚珠</text>

  <!-- 例（被子） -->
  <line class="link" x1="800" y1="324" x2="800" y2="360"/>
  <text class="linkword" x="833" y="342" style="font-size:11px;">例</text>
  <rect class="node-info" x="710" y="360" width="180" height="60" rx="8"/>
  <text class="label label-info" x="800" y="380">アブラナ・ツツジ</text>
  <text class="label label-info" x="800" y="400" style="font-size:11px;">タンポポ・サクラ など</text>

  <!-- 例（裸子） -->
  <line class="link" x1="1080" y1="324" x2="1080" y2="360"/>
  <text class="linkword" x="1113" y="342" style="font-size:11px;">例</text>
  <rect class="node-info" x="990" y="360" width="180" height="60" rx="8"/>
  <text class="label label-info" x="1080" y="380">マツ・イチョウ</text>
  <text class="label label-info" x="1080" y="400" style="font-size:11px;">スギ・ソテツ</text>

  <!-- どちらも種子をつくる -->
  <line class="link" x1="800" y1="420" x2="800" y2="475"/>
  <line class="link" x1="1080" y1="420" x2="1080" y2="475"/>
  <line class="link" x1="800" y1="475" x2="1080" y2="475"/>
  <line class="link" x1="940" y1="475" x2="940" y2="510"/>
  <text class="linkword" x="990" y="490" style="font-size:11px;">どちらも 花をさかせて</text>

  <rect class="node-leaf" x="870" y="510" width="140" height="44" rx="8"/>
  <text class="label label-leaf" x="940" y="532">種子をつくる</text>

</svg>

<div class="summary">
  <strong>📝 まとめ文（マップを矢印の順になぞって書こう）</strong>
  マツは <span class="blank">雌花</span> と <span class="blank">雄花</span> があり、 <span class="blank">花弁・がく</span> がなく、うろこのような <span class="blank">りん片</span> が重なっている。<br>
  雌花のりん片のつけ根には <span class="blank">子房</span> がなく、 <span class="blank">胚珠</span> が <span class="blank">むき出し</span> になっている。雄花のりん片には <span class="blank">花粉のう</span> があり、 <span class="blank">花粉</span> が入っている。<br>
  花粉が胚珠に直接ついて <span class="blank">受粉</span> し、 <span class="blank">種子</span> ができる。<br>
  マツのように子房がなく胚珠がむき出しになっている植物を <span class="blank">裸子植物</span>、アブラナのように子房の中に胚珠がある植物を <span class="blank">被子植物</span> といい、どちらも種子をつくるので <span class="blank">種子植物</span> という。
</div>

</div>
</body>
</html>
