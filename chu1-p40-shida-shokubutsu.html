<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シダ植物｜まとめマップ</title>
<style>
@page { size: A4 landscape; margin: 10mm; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "UD デジタル 教科書体 NP-B", "Hiragino Maru Gothic ProN", "Meiryo", sans-serif;
  background: white;
  color: #222;
  padding: 12px 16px;
}
.wrap { max-width: 1280px; margin: 0 auto; }
h1 {
  font-size: 18px;
  text-align: center;
  color: #222;
  padding-bottom: 6px;
  border-bottom: 2px solid #222;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}
.meta { text-align: center; font-size: 12px; color: #888; margin-bottom: 12px; }

svg { display: block; margin: 0 auto; width: 100%; height: auto; max-width: 1280px; }

.node {
  fill: white;
  stroke: #222;
  stroke-width: 1.6;
}
.node-main {
  fill: #fff9ec;
  stroke: #222;
  stroke-width: 2.5;
}
.node-leaf {
  fill: #fff4c2;
  stroke: #222;
  stroke-width: 2;
}
.node-cross {
  fill: #ffe3ec;
  stroke: #D63384;
  stroke-width: 2;
}
.node-info {
  fill: #f7f7f0;
  stroke: #888;
  stroke-width: 1.2;
}
.node-question {
  fill: #fef6dd;
  stroke: #C8961E;
  stroke-width: 1.6;
}
.label {
  font-family: inherit;
  font-size: 14px;
  fill: #222;
  text-anchor: middle;
  dominant-baseline: central;
}
.label-main { font-size: 16px; font-weight: bold; }
.label-leaf { font-weight: bold; font-size: 16px; }
.label-cross { fill: #D63384; font-weight: bold; }
.label-info { font-size: 12px; fill: #555; }
.label-question { font-size: 13px; fill: #6b4a00; }
.link {
  stroke: #222;
  stroke-width: 1.4;
  fill: none;
}
.linkword {
  font-size: 11px;
  fill: #666;
  text-anchor: middle;
  dominant-baseline: central;
  font-style: italic;
}

.summary {
  margin-top: 16px;
  padding: 12px 16px;
  border: 1.5px solid #222;
  font-size: 13px;
  line-height: 1.9;
}
.summary strong { display: block; margin-bottom: 4px; font-size: 14px; }
.summary .blank {
  display: inline-block;
  border-bottom: 1.5px solid #222;
  min-width: 70px;
  text-align: center;
  padding: 0 6px;
  color: #666;
  font-size: 12px;
}
.back-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #74c69d;
  color: white;
  border-radius: 14px;
  text-decoration: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
.back-btn:hover { background: #57b387; }
.words-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #f0a000;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
.words-btn:hover { background: #d68a00; }
.words-only {
  margin-top: 24px;
  padding: 28px 24px 50px;
  text-align: center;
  background: #fff8e8;
  border: 2px dashed #e8c84a;
  border-radius: 16px;
}
.words-only h2 {
  font-size: 20px;
  margin-bottom: 8px;
  color: #946800;
}
.words-only .hint {
  color: #886a3a;
  font-size: 13px;
  margin-bottom: 26px;
  line-height: 1.7;
}
.words-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 14px;
  max-width: 820px;
  margin: 0 auto;
}
.word-card {
  background: #fff4c2;
  border: 2px solid #e8c84a;
  border-radius: 12px;
  padding: 18px 10px;
  font-size: 17px;
  font-weight: bold;
  color: #6b4a00;
  box-shadow: 0 2px 4px rgba(216,173,105,0.2);
}
.print-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #D63384;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
@media print {
  .print-btn, .back-btn, .words-btn, .words-only { display: none; }
  body { padding: 0; }
}
</style>
</head>
<body>
<div class="wrap">

<h1>シダ植物｜まとめマップ <a href="index.html" class="back-btn">📋 一覧へ</a><button class="words-btn" onclick="toggleWords(this)">📝 語句のみ</button><button class="print-btn" onclick="window.print()">🖨 印刷</button></h1>
<div class="meta">中1理科 生物2章「植物の分類」P.40</div>

<svg viewBox="0 0 1280 460" xmlns="http://www.w3.org/2000/svg">

  <!-- 問いバナー -->
  <rect class="node-question" x="160" y="15" width="960" height="44" rx="8"/>
  <text class="label label-question" x="640" y="30" style="font-size:12px;">Q（問い）</text>
  <text class="label label-question" x="640" y="48">種子をつくらない植物のからだのつくりとふえ方の特徴は？</text>

  <!-- Q → 中心 -->
  <line class="link" x1="640" y1="59" x2="640" y2="85"/>

  <!-- 中心ノード -->
  <rect class="node-main" x="490" y="85" width="300" height="55" rx="10"/>
  <text class="label label-main" x="640" y="105" style="font-size:17px;">シダ植物</text>
  <text class="label" x="640" y="125" style="font-size:12px;fill:#666;">（種子をつくらない植物の仲間）</text>

  <!-- 中心 → 分岐 -->
  <line class="link" x1="640" y1="140" x2="640" y2="170"/>
  <line class="link" x1="320" y1="170" x2="960" y2="170"/>
  <line class="link" x1="320" y1="170" x2="320" y2="200"/>
  <line class="link" x1="960" y1="170" x2="960" y2="200"/>

  <!-- セクションタイトル -->
  <text x="320" y="187" style="font-size:11px;fill:#2E7D32;font-weight:bold;text-anchor:middle;">◆ からだのつくり ◆</text>
  <text x="960" y="187" style="font-size:11px;fill:#2E7D32;font-weight:bold;text-anchor:middle;">◆ ふえ方 ◆</text>

  <!-- ============ 左枝：からだのつくり ============ -->

  <!-- 葉・茎・根 がある -->
  <rect class="node-leaf" x="180" y="200" width="280" height="60" rx="8"/>
  <text class="label label-leaf" x="320" y="221" style="font-size:15px;">葉・茎・根 がある</text>
  <text class="label" x="320" y="244" style="font-size:11px;fill:#666;">（種子植物と同じ）</text>

  <!-- → 茎は地下 -->
  <line class="link" x1="320" y1="260" x2="320" y2="295"/>
  <text class="linkword" x="375" y="278">とくに</text>
  <rect class="node-info" x="200" y="295" width="240" height="44" rx="8"/>
  <text class="label label-info" x="320" y="317" style="font-size:13px;">茎は地下にある</text>

  <!-- ============ 右枝：ふえ方 ============ -->

  <!-- 種子をつくらない (cross) -->
  <rect class="node-cross" x="820" y="200" width="280" height="44" rx="8"/>
  <text class="label label-cross" x="960" y="222" style="font-size:14px;">種子 ✕（つくらない）</text>

  <!-- → 胞子でふえる -->
  <line class="link" x1="960" y1="244" x2="960" y2="280"/>
  <text class="linkword" x="1020" y="262">代わりに</text>
  <rect class="node-leaf" x="860" y="280" width="200" height="44" rx="8"/>
  <text class="label label-leaf" x="960" y="302">胞子 でふえる</text>

  <!-- → 胞子のう -->
  <line class="link" x1="960" y1="324" x2="960" y2="360"/>
  <text class="linkword" x="1015" y="342">入れ物</text>
  <rect class="node-leaf" x="820" y="360" width="280" height="65" rx="8"/>
  <text class="label label-leaf" x="960" y="380" style="font-size:15px;">胞子のう</text>
  <text class="label" x="960" y="404" style="font-size:11px;fill:#555;">葉の裏（イヌワラビ）／つくし（スギナ）</text>

</svg>

<div class="summary">
  <strong>📝 まとめ文（マップを矢印の順になぞって書こう）</strong>
  <span class="blank">シダ植物</span> は、種子をつくらない植物の仲間である。<br>
  からだのつくりは種子植物と同じで、 <span class="blank">葉</span> ・ <span class="blank">茎</span> ・ <span class="blank">根</span> がある。とくに茎は <span class="blank">地下</span> にある場合が多い。<br>
  ふえ方は種子植物と異なり、 <span class="blank">種子</span> をつくらず、代わりに <span class="blank">胞子</span> でふえる。胞子は <span class="blank">胞子のう</span> という入れ物の中につくられる。
</div>

<div class="words-only" hidden>
  <h2>📝 語句チェック</h2>
  <p class="hint">この語句が、マップのどこにあって、どうつながっていたか思い出せるかな？</p>
  <div class="words-grid">
    <div class="word-card">シダ植物</div>
    <div class="word-card">葉</div>
    <div class="word-card">茎</div>
    <div class="word-card">根</div>
    <div class="word-card">種子</div>
    <div class="word-card">胞子</div>
    <div class="word-card">胞子のう</div>
  </div>
</div>

<script>
function toggleWords(btn) {
  const svg = document.querySelector('svg');
  const summary = document.querySelector('.summary');
  const words = document.querySelector('.words-only');
  if (words.hidden) {
    svg.style.display = 'none';
    summary.style.display = 'none';
    words.hidden = false;
    btn.textContent = '🗺️ マップへ戻る';
  } else {
    svg.style.display = '';
    summary.style.display = '';
    words.hidden = true;
    btn.textContent = '📝 語句のみ';
  }
}
</script>

</div>
</body>
</html>
