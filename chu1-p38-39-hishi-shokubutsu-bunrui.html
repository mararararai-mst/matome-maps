<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>被子植物の分類（双子葉類・単子葉類）｜まとめマップ</title>
<style>
@page { size: A4 landscape; margin: 10mm; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "UD デジタル 教科書体 NP-B", "Hiragino Maru Gothic ProN", "Meiryo", sans-serif;
  background: white;
  color: #222;
  padding: 12px 16px;
}
.wrap { max-width: 1280px; margin: 0 auto; }
h1 {
  font-size: 18px;
  text-align: center;
  color: #222;
  padding-bottom: 6px;
  border-bottom: 2px solid #222;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}
.meta { text-align: center; font-size: 12px; color: #888; margin-bottom: 12px; }

svg { display: block; margin: 0 auto; width: 100%; height: auto; max-width: 1280px; }

.node {
  fill: white;
  stroke: #222;
  stroke-width: 1.6;
}
.node-main {
  fill: #fff9ec;
  stroke: #222;
  stroke-width: 2.5;
}
.node-leaf {
  fill: #fff4c2;
  stroke: #222;
  stroke-width: 2;
}
.node-info {
  fill: #f7f7f0;
  stroke: #888;
  stroke-width: 1.2;
}
.node-axis {
  fill: #eef2f7;
  stroke: #4a5b75;
  stroke-width: 1.6;
}
.label {
  font-family: inherit;
  font-size: 14px;
  fill: #222;
  text-anchor: middle;
  dominant-baseline: central;
}
.label-main { font-size: 16px; font-weight: bold; }
.label-leaf { font-weight: bold; font-size: 16px; }
.label-axis { font-weight: bold; font-size: 15px; fill: #2c3e50; }
.label-info { font-size: 12px; fill: #555; }
.link {
  stroke: #222;
  stroke-width: 1.4;
  fill: none;
}
.link-axis {
  stroke: #4a5b75;
  stroke-width: 1.2;
  fill: none;
}
.linkword {
  font-size: 11px;
  fill: #666;
  text-anchor: middle;
  dominant-baseline: central;
  font-style: italic;
}

.summary {
  margin-top: 16px;
  padding: 12px 16px;
  border: 1.5px solid #222;
  font-size: 13px;
  line-height: 1.9;
}
.summary strong { display: block; margin-bottom: 4px; font-size: 14px; }
.summary .blank {
  display: inline-block;
  border-bottom: 1.5px solid #222;
  min-width: 70px;
  text-align: center;
  padding: 0 6px;
  color: #666;
  font-size: 12px;
}
.back-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #74c69d;
  color: white;
  border-radius: 14px;
  text-decoration: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
.back-btn:hover { background: #57b387; }
.words-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #f0a000;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
.words-btn:hover { background: #d68a00; }
.words-only {
  margin-top: 24px;
  padding: 28px 24px 50px;
  text-align: center;
  background: #fff8e8;
  border: 2px dashed #e8c84a;
  border-radius: 16px;
}
.words-only h2 {
  font-size: 20px;
  margin-bottom: 8px;
  color: #946800;
}
.words-only .hint {
  color: #886a3a;
  font-size: 13px;
  margin-bottom: 26px;
  line-height: 1.7;
}
.words-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 14px;
  max-width: 820px;
  margin: 0 auto;
}
.word-card {
  background: #fff4c2;
  border: 2px solid #e8c84a;
  border-radius: 12px;
  padding: 18px 10px;
  font-size: 17px;
  font-weight: bold;
  color: #6b4a00;
  box-shadow: 0 2px 4px rgba(216,173,105,0.2);
}
.print-btn {
  display: inline-block;
  padding: 4px 14px;
  background: #D63384;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  margin-left: 8px;
  vertical-align: middle;
}
@media print {
  .print-btn, .back-btn, .words-btn, .words-only { display: none; }
  body { padding: 0; }
}
</style>
</head>
<body>
<div class="wrap">

<h1>被子植物の分類（双子葉類・単子葉類）｜まとめマップ <a href="index.html" class="back-btn">📋 一覧へ</a><button class="words-btn" onclick="toggleWords(this)">📝 語句のみ</button><button class="print-btn" onclick="window.print()">🖨 印刷</button></h1>
<div class="meta">中1理科 生物2章「植物の分類」P.38-39</div>

<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">

  <!-- 被子植物（中心トップ） -->
  <rect class="node-main" x="540" y="15" width="200" height="45" rx="10"/>
  <text class="label label-main" x="640" y="38">被子植物</text>

  <!-- 中心 → 分岐 -->
  <line class="link" x1="640" y1="60" x2="640" y2="82"/>
  <text class="linkword" x="735" y="73">子葉の枚数で分ける</text>

  <line class="link" x1="230" y1="82" x2="1050" y2="82"/>
  <line class="link" x1="230" y1="82" x2="230" y2="105"/>
  <line class="link" x1="1050" y1="82" x2="1050" y2="105"/>

  <!-- 双子葉類 main（左・黄系） -->
  <rect class="node-main" x="130" y="105" width="200" height="50" rx="10" style="fill:#fff4c2;"/>
  <text class="label label-main" x="230" y="130" style="font-size:17px;">双子葉類</text>

  <!-- 単子葉類 main（右・緑系） -->
  <rect class="node-main" x="950" y="105" width="200" height="50" rx="10" style="fill:#d8f3dc;stroke:#2E7D32;"/>
  <text class="label label-main" x="1050" y="130" style="font-size:17px;fill:#1b5e20;">単子葉類</text>

  <!-- 左右の縦幹線（mains → 1行目） -->
  <line class="link" x1="230" y1="155" x2="230" y2="180"/>
  <line class="link" x1="1050" y1="155" x2="1050" y2="180"/>

  <!-- ============ 共通軸：中央列を縦に貫く点線 ============ -->
  <line class="link-axis" x1="640" y1="180" x2="640" y2="364" style="stroke-dasharray:4 4;opacity:0.5;"/>

  <!-- ============ Row 1: 子葉（y=180-224） ============ -->

  <!-- 双子葉値 -->
  <rect class="node-leaf" x="130" y="180" width="200" height="44" rx="8" style="fill:#fff4c2;"/>
  <text class="label label-leaf" x="230" y="202">2 枚</text>

  <!-- 中央：子葉（共通軸） -->
  <rect class="node-axis" x="560" y="180" width="160" height="44" rx="8"/>
  <text class="label label-axis" x="640" y="202">子葉</text>

  <!-- 単子葉値 -->
  <rect class="node-leaf" x="950" y="180" width="200" height="44" rx="8" style="fill:#d8f3dc;stroke:#2E7D32;"/>
  <text class="label label-leaf" x="1050" y="202" style="fill:#1b5e20;">1 枚</text>

  <!-- 横の対比線 -->
  <line class="link-axis" x1="330" y1="202" x2="560" y2="202"/>
  <line class="link-axis" x1="720" y1="202" x2="950" y2="202"/>

  <!-- 縦の連結（次の軸へ） -->
  <line class="link" x1="230" y1="224" x2="230" y2="250"/>
  <line class="link" x1="1050" y1="224" x2="1050" y2="250"/>

  <!-- ============ Row 2: 葉脈（y=250-294） ============ -->

  <rect class="node-leaf" x="130" y="250" width="200" height="44" rx="8" style="fill:#fff4c2;"/>
  <text class="label label-leaf" x="230" y="272">網状脈</text>

  <rect class="node-axis" x="560" y="250" width="160" height="44" rx="8"/>
  <text class="label label-axis" x="640" y="272">葉脈</text>

  <rect class="node-leaf" x="950" y="250" width="200" height="44" rx="8" style="fill:#d8f3dc;stroke:#2E7D32;"/>
  <text class="label label-leaf" x="1050" y="272" style="fill:#1b5e20;">平行脈</text>

  <line class="link-axis" x1="330" y1="272" x2="560" y2="272"/>
  <line class="link-axis" x1="720" y1="272" x2="950" y2="272"/>

  <line class="link" x1="230" y1="294" x2="230" y2="320"/>
  <line class="link" x1="1050" y1="294" x2="1050" y2="320"/>

  <!-- ============ Row 3: 根（y=320-364） ============ -->

  <rect class="node-leaf" x="130" y="320" width="200" height="44" rx="8" style="fill:#fff4c2;"/>
  <text class="label label-leaf" x="230" y="342">主根＋側根</text>

  <rect class="node-axis" x="560" y="320" width="160" height="44" rx="8"/>
  <text class="label label-axis" x="640" y="342">根</text>

  <rect class="node-leaf" x="950" y="320" width="200" height="44" rx="8" style="fill:#d8f3dc;stroke:#2E7D32;"/>
  <text class="label label-leaf" x="1050" y="342" style="fill:#1b5e20;">ひげ根</text>

  <line class="link-axis" x1="330" y1="342" x2="560" y2="342"/>
  <line class="link-axis" x1="720" y1="342" x2="950" y2="342"/>

</svg>

<div class="summary">
  <strong>📝 まとめ文（マップを矢印の順になぞって書こう）</strong>
  被子植物は <span class="blank">子葉</span> の枚数で <span class="blank">双子葉類</span> と <span class="blank">単子葉類</span> に分類できる。<br>
  <span class="blank">双子葉類</span> は子葉が <span class="blank">2</span> 枚で、葉脈は <span class="blank">網状脈</span>、根は <span class="blank">主根</span> と <span class="blank">側根</span> からなる。<br>
  <span class="blank">単子葉類</span> は子葉が <span class="blank">1</span> 枚で、葉脈は <span class="blank">平行脈</span>、根は <span class="blank">ひげ根</span> である。
</div>

<div class="words-only" hidden>
  <h2>📝 語句チェック</h2>
  <p class="hint">この語句が、マップのどこにあって、どうつながっていたか思い出せるかな？</p>
  <div class="words-grid">
    <div class="word-card">被子植物</div>
    <div class="word-card">双子葉類</div>
    <div class="word-card">単子葉類</div>
    <div class="word-card">子葉</div>
    <div class="word-card">網状脈</div>
    <div class="word-card">平行脈</div>
    <div class="word-card">主根</div>
    <div class="word-card">側根</div>
    <div class="word-card">ひげ根</div>
  </div>
</div>

<script>
function toggleWords(btn) {
  const svg = document.querySelector('svg');
  const summary = document.querySelector('.summary');
  const words = document.querySelector('.words-only');
  if (words.hidden) {
    svg.style.display = 'none';
    summary.style.display = 'none';
    words.hidden = false;
    btn.textContent = '🗺️ マップへ戻る';
  } else {
    svg.style.display = '';
    summary.style.display = '';
    words.hidden = true;
    btn.textContent = '📝 語句のみ';
  }
}
</script>

</div>
</body>
</html>
